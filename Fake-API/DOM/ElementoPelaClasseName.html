<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>



<body>

    <input type="text" onclick="getElements()" placeholder="digite o nome da classe">
    <button onclick="getElements()">Pegar elementos</button>

    <ul>
        <li class="corsim">Item 1</li>
        <li class="cornao">Item 2</li>
        <li class="corsim">Item 3</li>  
        <li class="cornao">Item 4</li>

        <li class="teste">Item 5</li>
        <li class="teste">Item 6</li>
        <li class="teste">Item 7</li>
        <li class="teste">Item 8</li>
    </ul>

    <script>
        function getElements(nomeClasse = "cornao") {
    cornoes = document.getElementsByClassName(nomeClasse);

    
    for (let i = 0; i < cornoes.length; i++) {
        console.log("Texto do item " + i + " + " + cornoes[i].textContent);
    }
}
    </script>
    
</body>
</html>
